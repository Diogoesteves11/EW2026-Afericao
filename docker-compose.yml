services:
  mongodb:
    build:
      context: ./ex1
      dockerfile: Dockerfile.mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    networks:
      - autorepair-network

  api:
    build: 
      context: ./ex1
      dockerfile: Dockerfile.api
    container_name: dataAPI
    ports:
      - "16025:16025" 
    environment:
      - MONGO_URL=mongodb://mongodb:27017/autoRepair
    depends_on:
      - mongodb
    networks:
      - autorepair-network

  interface:
    build:
      context: ./ex2
      dockerfile: Dockerfile.web
    container_name: webInterface
    ports:
      - "16026:16026"
    environment:
      - API_URL=http://dataAPI:16025 
    depends_on:
      - api
    networks:
      - autorepair-network

networks:
  autorepair-network:
    driver: bridge